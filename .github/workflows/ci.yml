name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-13, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt drift in:"
            echo "$out"
            exit 1
          fi

      - name: build
        run: go build ./...

      - name: test
        run: go test -race -timeout 60s ./...

  mcp:
    name: mcp-server (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: install
        working-directory: mcp-server
        run: npm ci

      - name: typecheck
        working-directory: mcp-server
        run: npm run typecheck

      - name: test
        working-directory: mcp-server
        run: npm test

  build-matrix:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [test, mcp]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so `git describe --tags` resolves real releases

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo none)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -trimpath \
            -ldflags="-s -w \
              -X github.com/hunchom/bodega/internal/version.Version=${VERSION} \
              -X github.com/hunchom/bodega/internal/version.Commit=${COMMIT} \
              -X github.com/hunchom/bodega/internal/version.Date=${DATE}" \
            -o yum-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/yum

      - uses: actions/upload-artifact@v4
        with:
          name: yum-${{ matrix.goos }}-${{ matrix.goarch }}
          path: yum-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7
